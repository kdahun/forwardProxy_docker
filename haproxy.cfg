# 프로세스 전역 설정
global
    log stdout format raw local0 debug # 로그 출력
    maxconn 512             # 선박 환경에 맞게 축소 (기존 1024) - 동시에 처리할 수 있는 최대 TCP 연결 수
    nbthread 1              # 커넥션 풀 공유를 위해 단일 스레드 (http-reuse always 효과 극대화)
    tune.bufsize 16384      # 커넥션당 버퍼 크기 명시 (기본값)
    # tune.ssl.keylog on      # TLS 세션 키 로깅 (Wireshark 복호화용, 운영환경에서는 제거)

# 공통 기본값
defaults
    log     global          # global에서 정의한 로그 설정을 그대로 상속
    mode    http            # 기본 동작을 HTTP 모드로 설정
    option  dontlognull
    option  http-keep-alive     # 커넥션 재사용 → 오버헤드 감소 / 매 요청마다 TCP 연결을 새로 만들지 않아도됨 
    # 간소화된 로그 포맷 (I/O 부하 절감)
    # req.hdr()은 HTTP 전용 fetch라 defaults에 두면 TCP 컨텍스트에서 파싱 오류 발생 → 제거
    # 로그 포맷: 클라이언트IP [시각] 요청라인 상태코드 처리시간
    # ssl_fc         : TLS 연결 여부 (1=TLS, 0=평문)
    # ssl_fc_is_resumed : TLS 세션 재사용 여부 (1=재사용, 0=풀 핸드셰이크)
    # ssl_fc_cipher  : 협상된 암호화 스위트
    # ssl_fc_protocol: 협상된 TLS 버전 (TLSv1.2 / TLSv1.3)
    log-format "%ci [%t] %r %ST %Ta tls=%[ssl_fc] resumed=%[ssl_fc_is_resumed] cipher=%[ssl_fc_cipher] proto=%[ssl_fc_protocol]"
    # SSL 키 로그 (Wireshark 복호화용) — 운영환경에서 반드시 제거
    log-format-sd "%[ssl_fc_session_id,hex] %[ssl_fc_client_random,hex]"

    # HAProxy가 백엔드 서버에 TCP 연결을 시도할 때 기다리는 최대 시간 / 5초 안에 연결안 되면 503 반환
    timeout connect  5s         # 10s → 5s

    # 클라이언트 - HAProxy 간 유휴 연결 유지 시간 / 30분 동안 데이터가 없으면 클라이언트 측 연결 종료
    timeout client   30m        # 1h → 30m (유휴 커넥션 조기 해제)

    # HAProxy - 백엔드 서버 간 유휴 연결 유지 시간
    timeout server   30m        # 1h → 30m

    # WebSocket 처럼 업그레이트된 터널 연결의 유지 시간 - Rest API에는 적용 안 됨.
    timeout tunnel   1h         # WebSocket 세션 유지 필수

# ────────────────────────────────────────────────────────────
# Stats 페이지 — http://<proxy-ip>:28404/stats - 모니터링 UI
# ────────────────────────────────────────────────────────────
frontend stats
    bind *:28404
    stats enable
    stats uri /stats
    stats refresh 30s           # 10s → 30s (폴링 부하 절감)
    stats admin if TRUE

# ────────────────────────────────────────────────────────────
# Frontend: Java GW 클라이언트가 붙는 포트 (HTTP)
# ────────────────────────────────────────────────────────────
frontend http_in
    # 28080 포트에서 HTTP 요청 수신
    bind *:28080
    mode http

    # ── 인바운드 제어: 허용할 클라이언트 IP ───────────────
    # Windows Docker Desktop 환경에서는 host 모드에서도 WSL2 NAT을 거쳐
    # 실제 Windows IP(192.168.50.9) 대신 Docker 내부 IP(192.168.143.x)로 변환되어 들어옴
    # acl allowed_src src 192.168.143.0/24
    # http-request deny unless allowed_src

    # ── 아웃바운드 제어: 허용할 path ACL ──────────────────
    acl is_health   path_beg /api/test
    acl is_session  path_beg /api/login
    acl is_ws       path_beg /ws
    acl is_hello    path_beg /hello
    acl is_register    path_beg /api/register
    acl is_certificate path_beg /api/certificate
    acl is_subscriptions path_beg /api/subscriptions

    # 위 path 외 모든 요청 차단
    http-request deny unless is_health or is_session or is_ws or is_hello or is_register or is_certificate or is_subscriptions

    # register, certificate는 POST만 허용
    # acl is_post method POST
    # http-request deny if is_register !is_post
    # http-request deny if is_certificate !is_post

    # WebSocket 업그레이드 감지
    acl is_ws_upgrade hdr(Upgrade) -i websocket

    # WebSocket 요청 → tcp_ws_backend 로 전환
    use_backend tcp_ws_backend if is_ws_upgrade

    # 나머지 HTTP 요청 → rest_backend
    default_backend rest_backend

# ────────────────────────────────────────────────────────────
# Backend: REST API (HTTP)
# ────────────────────────────────────────────────────────────
backend rest_backend
    mode http
    option forwardfor           # X-Forwarded-For 헤더를 추가하여 원본 클라이언트 IP를 백엔드에 전달

    # HAProxy -> Shore 서버 간 TLS 연결을 재사용 / 매 요청마다 TLS handshake를 하지 않아도됨.
    option http-keep-alive      
    http-reuse always           # 다른 클라이언트 요청이라도 연결 재사용?

    timeout http-keep-alive 30m # 유휴 상태에서도 백엔드 연결 유지(30분) → http-reuse 동작 전제조건 (timeout server와 동일)
    
    # HTTP/1.1은 keep-alive가 기본값 → 명시적 설정 불필요 (오히려 NGINX가 hop-by-hop으로 해석해 연결 종료 유발)

    # SHORE_HOST / SHORE_PORT 는 docker-compose 환경변수로 주입
    # ssl        : HTTPS로 연결 (TLS 활성화)
    # crt        : 내 인증서(client.pem = client.key + client.crt 합본) → mTLS용 클라이언트 인증
    # ca-file    : 상대방(Nginx) 인증서 검증용
    # verify required : 인증서 검증 필수 (불일치 시 연결 차단)
    # check inter 300s rise 2 fall 3  ← 헬스체크 필요 시 아래 줄 끝에 추가
    # check inter 30s  : 30초마다 서버 헬스체크 → stale 연결 조기 감지
    # rise 2           : 2회 성공 시 서버 복구로 판단
    # fall 3           : 3회 실패 시 서버 다운으로 판단
    server rest-api ${SHORE_HOST}:${SHORE_PORT} ssl crt /etc/haproxy/certs/client.pem ca-file /etc/haproxy/certs/ca.crt verify required check inter 30s rise 2 fall 3

# ────────────────────────────────────────────────────────────
# Backend: WebSocket
# HAProxy HTTP 모드에서 101 업그레이드 후 자동으로 TCP 터널로 전환
# ws_in (28081) 제거 → http_in (28080)에서 Upgrade 헤더로 자동 분기
# ────────────────────────────────────────────────────────────

backend tcp_ws_backend
    mode http
    timeout tunnel 1h
    # ssl        : WSS로 연결 (WebSocket over TLS)
    # crt        : 내 인증서(client.pem) → mTLS용 클라이언트 인증
    # ca-file    : 상대방(Nginx) 인증서 검증용
    # verify required : 인증서 검증 필수
    # check inter 300s rise 2 fall 3  ← 헬스체크 필요 시 아래 줄 끝에 추가
    server ws-api ${SHORE_HOST}:${SHORE_PORT} ssl crt /etc/haproxy/certs/client.pem ca-file /etc/haproxy/certs/ca.crt verify required check inter 30s rise 2 fall 3
