global
    log stdout format raw local0 info
    maxconn 512             # 선박 환경에 맞게 축소 (기존 1024)
    nbthread 2              # 스레드 수 제한으로 CPU 과점유 방지
    tune.bufsize 16384      # 커넥션당 버퍼 크기 명시 (기본값)

defaults
    log     global
    mode    http
    option  dontlognull
    option  http-keep-alive     # 커넥션 재사용 → 오버헤드 감소
    # 간소화된 로그 포맷 (I/O 부하 절감)
    # req.hdr()은 HTTP 전용 fetch라 defaults에 두면 TCP 컨텍스트에서 파싱 오류 발생 → 제거
    log-format "%ci [%t] %r %ST %Ta"
    timeout connect  5s         # 10s → 5s
    timeout client   30m        # 1h → 30m (유휴 커넥션 조기 해제)
    timeout server   30m        # 1h → 30m
    timeout tunnel   1h         # WebSocket 세션 유지 필수

# ────────────────────────────────────────────────────────────
# Stats 페이지 — http://<proxy-ip>:28404/stats
# ────────────────────────────────────────────────────────────
frontend stats
    bind *:28404
    stats enable
    stats uri /stats
    stats refresh 30s           # 10s → 30s (폴링 부하 절감)
    stats admin if TRUE

# ────────────────────────────────────────────────────────────
# Frontend: Java GW 클라이언트가 붙는 포트 (HTTP)
# ────────────────────────────────────────────────────────────
frontend http_in
    bind *:28080
    mode http

    # ── 인바운드 제어: 허용할 클라이언트 IP ───────────────
    # Windows Docker Desktop 환경에서는 host 모드에서도 WSL2 NAT을 거쳐
    # 실제 Windows IP(192.168.50.9) 대신 Docker 내부 IP(192.168.143.x)로 변환되어 들어옴
    # acl allowed_src src 192.168.143.0/24
    # http-request deny unless allowed_src

    # ── 아웃바운드 제어: 허용할 path ACL ──────────────────
    acl is_health   path_beg /api/test
    acl is_session  path_beg /api/login
    acl is_ws       path_beg /ws
    acl is_hello    path_beg /hello
    acl is_register    path_beg /api/register
    acl is_certificate path_beg /api/certificate
    acl is_subscriptions path_beg /api/subscriptions

    # 위 path 외 모든 요청 차단
    http-request deny unless is_health or is_session or is_ws or is_hello or is_register or is_certificate or is_subscriptions

    # register, certificate는 POST만 허용
    acl is_post method POST
    http-request deny if is_register !is_post
    http-request deny if is_certificate !is_post

    # WebSocket 업그레이드 감지
    acl is_ws_upgrade hdr(Upgrade) -i websocket

    # WebSocket 요청 → tcp_ws_backend 로 전환
    use_backend tcp_ws_backend if is_ws_upgrade

    # 나머지 HTTP 요청 → rest_backend
    default_backend rest_backend

# ────────────────────────────────────────────────────────────
# Backend: REST API (HTTP)
# ────────────────────────────────────────────────────────────
backend rest_backend
    mode http
    option forwardfor
    option http-keep-alive

    # SHORE_HOST / SHORE_PORT 는 docker-compose 환경변수로 주입
    # ssl        : HTTPS로 연결 (TLS 활성화)
    # crt        : 내 인증서(client.pem = client.key + client.crt 합본) → mTLS용 클라이언트 인증
    # ca-file    : 상대방(Nginx) 인증서 검증용
    # verify required : 인증서 검증 필수 (불일치 시 연결 차단)
    server rest-api ${SHORE_HOST}:${SHORE_PORT} ssl crt /etc/haproxy/certs/client.pem ca-file /etc/haproxy/certs/ca.crt verify required check inter 15s rise 2 fall 3

# ────────────────────────────────────────────────────────────
# Backend: WebSocket
# HAProxy HTTP 모드에서 101 업그레이드 후 자동으로 TCP 터널로 전환
# ────────────────────────────────────────────────────────────
frontend ws_in
    bind *:28081
    mode http

    # 허용된 클라이언트 IP만 WebSocket 접근 허용
    # acl allowed_src src 192.168.143.0/24
    # http-request deny unless allowed_src

    default_backend tcp_ws_backend

backend tcp_ws_backend
    mode http
    timeout tunnel 1h
    # ssl        : WSS로 연결 (WebSocket over TLS)
    # crt        : 내 인증서(client.pem) → mTLS용 클라이언트 인증
    # ca-file    : 상대방(Nginx) 인증서 검증용
    # verify required : 인증서 검증 필수
    server ws-api ${SHORE_HOST}:${SHORE_PORT} ssl crt /etc/haproxy/certs/client.pem ca-file /etc/haproxy/certs/ca.crt verify required check inter 15s rise 2 fall 3
